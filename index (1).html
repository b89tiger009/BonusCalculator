<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考績獎金試算系統</title>
    <style>
        :root {
            --primary-color: #2b5c8f;
            --primary-light: #eef4fa;
            --accent-color: #2a9d8f;
            --text-dark: #2d3748;
            --text-light: #718096;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: #f7fafc;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.85;
        }

        .calc-section {
            padding: 35px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px 12px 35px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(43, 92, 143, 0.15);
        }

        .result-box {
            background-color: var(--primary-light);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            border-left: 5px solid var(--primary-color);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e0;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-light);
        }

        .result-value {
            font-size: 16px;
            font-weight: 600;
        }

        .result-total {
            font-size: 24px;
            color: #d9383a;
            font-weight: 700;
        }

        .motivation-box {
            margin-top: 20px;
            background: #fff;
            border: 1px solid #ffe3e3;
            border-radius: 8px;
            padding: 15px;
            display: none;
        }

        .motivation-box.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .motivation-title {
            font-size: 13px;
            font-weight: bold;
            color: #e53e3e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .motivation-text {
            font-size: 14px;
            color: #4a5568;
            line-height: 1.5;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>員工考績獎金試算系統</h1>
        <p>請輸入月薪與考績分數，自動依據公司發放標準精確計算</p>
    </div>

    <div class="calc-section">
        <div class="form-group">
            <label for="salary">每月薪資 (月薪)</label>
            <div class="input-wrapper">
                <span>$</span>
                <input type="number" id="salary" class="form-control" placeholder="請輸入月薪金額" value="60000" min="0" oninput="calculateBonus()">
            </div>
        </div>

        <div class="form-group">
            <label for="score">考績分數 (79 - 100)</label>
            <div class="input-wrapper">
                <span>★</span>
                <input type="number" id="score" class="form-control" placeholder="請輸入考績分數" value="88" min="0" max="100" oninput="calculateBonus()">
            </div>
        </div>

        <div class="result-box">
            <div class="result-row">
                <span class="result-label">考核等第</span>
                <span class="result-value" id="res-grade">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">獎金基數</span>
                <span class="result-value" id="res-base" style="color: var(--primary-color); font-size: 18px;">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">預估考績獎金</span>
                <span class="result-total" id="res-amount">$0</span>
            </div>
        </div>

        <div class="motivation-box" id="motivation-card">
            <div class="motivation-title">💡 主管寄語與激勵方針</div>
            <div class="motivation-text" id="motivation-content"></div>
        </div>
    </div>
</div>

<script>
    // 依據圖片資料建立之規則資料庫
    const rules = [
        { grade: '優', score: 95, base: 3.7, slogan: '卓越超群！您是團隊的耀眼燈塔，感謝您無懈可擊的極致貢獻，新的一年繼續攜手締造傳奇！' },
        { grade: '優', score: 94, base: 3.4, slogan: '戰功彪炳！表現近乎完美，突破自我的專業令人敬佩，期待您持續發揮影響力！' },
        { grade: '優', score: 93, base: 3.1, slogan: '亮眼奪目！工作成效斐然，展現了高超的專業價值，向您卓越的表現致敬！' },
        { grade: '優', score: 92, base: 2.8, slogan: '出類拔萃！執行力與成果皆屬頂尖，是團隊不可或缺的中流砥柱，太棒了！' },
        { grade: '甲', score: 90, base: 2.5, slogan: '表現極佳！穩健而高效地超越目標，深受夥伴信賴，離「優」等僅一步之遙，再接再厲！' },
        { grade: '甲', score: 89, base: 2.2, slogan: '突破自我！展現出色的工作品質與穩定度，績效斐然，期待您下一階段更上層樓！' },
        { grade: '甲', score: 88, base: 2.0, slogan: '表現稱職！完美達成既定任務，品質優良，感謝您的辛勞付出，繼續保持優勢！' },
        { grade: '甲', score: 87, base: 1.8, slogan: '穩紮穩打！整體表現均在水準之上，細節處若能更主動突破，將能迎來更大爆發！' },
        { grade: '甲', score: 86, base: 1.7, slogan: '表現穩定！按部就班完成各項工作，若能多點創意思維與挑戰精神，成果會更驚艷！' },
        { grade: '甲', score: 85, base: 1.6, slogan: '工作盡責！具備良好的執行力，期望新年度能主動承擔更多挑戰，放大自身優勢！' },
        { grade: '甲', score: 84, base: 1.5, slogan: '恪盡職守！基本功紮實，建議多與資深同仁交流，提升策略思考，下期必能拿高分！' },
        { grade: '甲', score: 83, base: 1.4, slogan: '表現平穩！日常業務推動順利，期待您在核心專業上加深鑽研，展現獨特亮點！' },
        { grade: '甲', score: 82, base: 1.3, slogan: '守成有餘！完成了交付的基礎工作，多建立跨領域思維，能讓工作成效更顯著！' },
        { grade: '甲', score: 81, base: 1.2, slogan: '尚有潛力！已達到基本要求，但在效率與主動性上還有極大的成長空間，加油！' },
        { grade: '甲', score: 80, base: 1.1, slogan: '低空過關！剛好跨入甲等門檻，必須加把勁調整工作狀態，找出盲點重新出發！' },
        { grade: '乙', score: 79, base: 1.0, slogan: '辛苦了！雖然這期未達預期，但失敗是成功的養分。釐清盲點、沉澱蓄力，下個季度我們一起逆襲！' }
    ];

    // 核心計算與邏輯匹配
    function calculateBonus() {
        const salary = parseFloat(document.getElementById('salary').value) || 0;
        const score = parseInt(document.getElementById('score').value);
        
        if (isNaN(score) || score < 0) {
            document.getElementById('res-grade').innerText = '-';
            document.getElementById('res-base').innerText = '-';
            document.getElementById('res-amount').innerText = '$0';
            document.getElementById('motivation-card').classList.remove('active');
            return;
        }

        let matched = null;
        
        // 級距邊界處理
        if (score >= 95) {
            matched = rules[0]; 
        } else if (score <= 79) {
            matched = rules[rules.length - 1]; 
        } else {
            // 精確匹配或向下尋找最近的級距
            matched = rules.find(r => r.score === score);
            if (!matched) {
                // 若輸入無對應分數（如91分），自動向下採計最近的下限級距
                for(let i=0; i<rules.length; i++) {
                    if (score > rules[i].score) {
                        matched = rules[i];
                        break;
                    }
                }
            }
        }

        if (matched) {
            const bonusAmount = Math.round(salary * matched.base);

            // 更新結果介面
            document.getElementById('res-grade').innerText = `【${matched.grade} 等】`;
            document.getElementById('res-base').innerText = `${matched.base.toFixed(2)} 個月`;
            document.getElementById('res-amount').innerText = `$${bonusAmount.toLocaleString()}`;
            
            // 更新激勵話語
            let sloganText = matched.slogan;
            if (matched.score !== score) {
                sloganText = `[分數 ${score} 分適用 ${matched.score} 分級距] ` + sloganText;
            }
            
            document.getElementById('motivation-content').innerText = sloganText;
            document.getElementById('motivation-card').classList.add('active');
        }
    }

    // 初始化試算一次
    calculateBonus();
</script>

</body>
</html>
